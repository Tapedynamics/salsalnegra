<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, follow">
    <title>Página No Encontrada | Sal Negra Tenerife</title>

    <!-- No canonical for 404 pages -->
    <link rel="icon" type="image/png" href="images/logo-header.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;700&family=Poppins:wght@300;400;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --color-primary: #8b6f5c;
            --color-black: #0a0a0a;
            --color-white: #ffffff;
            --color-gray: #5e5e5e;
            --font-heading: 'Cormorant Garamond', serif;
            --font-body: 'Poppins', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-body);
            background-color: #f9f6f3;
            color: var(--color-black);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }

        .logo {
            width: 80px;
            height: 80px;
            object-fit: contain;
            margin-bottom: 2rem;
            opacity: 0.8;
        }

        .error-code {
            font-family: var(--font-heading);
            font-size: clamp(5rem, 15vw, 9rem);
            font-weight: 700;
            color: var(--color-primary);
            line-height: 1;
            letter-spacing: -0.02em;
        }

        h1 {
            font-family: var(--font-heading);
            font-size: clamp(1.4rem, 4vw, 2rem);
            font-weight: 400;
            margin: 1rem 0 0.75rem;
            color: var(--color-black);
        }

        p {
            font-size: 0.95rem;
            color: var(--color-gray);
            line-height: 1.7;
            max-width: 420px;
            margin: 0 auto 2rem;
        }

        .nav-links {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            justify-content: center;
            margin-bottom: 2.5rem;
        }

        .nav-links a {
            display: inline-block;
            padding: 0.55rem 1.25rem;
            border: 1px solid var(--color-primary);
            border-radius: 2px;
            color: var(--color-primary);
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 500;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            transition: all 0.25s ease;
        }

        .nav-links a:hover {
            background-color: var(--color-primary);
            color: var(--color-white);
        }

        .btn-home {
            display: inline-block;
            padding: 0.8rem 2rem;
            background-color: var(--color-primary);
            color: var(--color-white);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            border-radius: 2px;
            transition: background-color 0.25s ease;
        }

        .btn-home:hover {
            background-color: #7a5f4e;
        }

        .divider {
            width: 40px;
            height: 1px;
            background-color: var(--color-primary);
            margin: 1.5rem auto;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <img src="images/logo-header.png" alt="Sal Negra Tenerife" class="logo">

    <div class="error-code">404</div>

    <h1>Página no encontrada</h1>

    <p>Lo sentimos, la página que buscas no existe o ha sido movida. Explora nuestro restaurante desde aquí.</p>

    <div class="nav-links">
        <a href="/carta">Carta</a>
        <a href="/reservas">Reservas</a>
        <a href="/eventos">Eventos</a>
        <a href="/menus-especiales">Menús Especiales</a>
        <a href="/sobre-nosotros">Sobre Nosotros</a>
        <a href="/contacto">Contacto</a>
    </div>

    <div class="divider"></div>

    <a href="/" class="btn-home">Volver al Inicio</a>
</body>
</html>
