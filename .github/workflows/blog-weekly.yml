name: Weekly Blog Post

on:
  schedule:
    # Mon 08:00 UTC = 09:00 CET (winter) / 10:00 CEST (summer)
    - cron: '0 8 * * 1'
  workflow_dispatch:
    inputs:
      topic_id:
        description: 'Pin a specific topic id (optional)'
        required: false
        default: ''
      dry_run:
        description: 'Dry run (no files written, no commit)'
        type: boolean
        required: false
        default: false

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout site
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: .github/scripts/blog/package-lock.json

      - name: Install deps
        working-directory: .github/scripts/blog
        run: npm install --no-audit --no-fund

      - name: Configure git
        run: |
          git config user.name 'Sal Negra Blog Bot'
          git config user.email 'blog-bot@salnegratenerife.com'

      - name: Generate post
        working-directory: .github/scripts/blog
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SITE_ROOT: ${{ github.workspace }}
          GIT_AUTHOR_NAME: Sal Negra Blog Bot
          GIT_AUTHOR_EMAIL: blog-bot@salnegratenerife.com
          GIT_BRANCH: main
          TOPIC_ID: ${{ inputs.topic_id }}
          DRY_RUN: ${{ inputs.dry_run && '1' || '' }}
        run: node src/generate.js

      - name: Summary
        if: always()
        run: echo "Blog run finished — check commit on main if a post was published."
